name: Deploy Hypamail Web

# Rebuilds the rootless podman image and restarts the quadlet service on push.
# Uses a native SSH deploy with dial retries: the VPS occasionally drops a single
# inbound SYN from GitHub's shared runner IPs (transient OVH/edge), which made the
# no-retry appleboy/ssh-action fail with "dial tcp i/o timeout". Retrying the dial
# a few times makes the deploy resilient to that.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (retrying dial)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          remote_script='
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            cd ~/hypamail-web
            git fetch origin
            git reset --hard origin/main
            podman build --network=host --build-arg DEPLOYMENT_ID=$(git rev-parse --short HEAD) -t localhost/hypamail-web:latest .
            systemctl --user restart hypamail-web.service
            podman image prune -f
          '

          for attempt in 1 2 3 4 5; do
            echo "::group::Deploy attempt $attempt"
            if ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
                 -o StrictHostKeyChecking=accept-new \
                 -o ConnectTimeout=20 -o ServerAliveInterval=10 \
                 "ubuntu@$SERVER_IP" "$remote_script"; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "All deploy attempts failed" >&2
          exit 1
