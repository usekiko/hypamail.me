name: Deploy Hypamail Web
# deploy trigger

# Rebuilds the rootless podman image and restarts the quadlet service on push.
# NOTE: the VPS sets `PerSourcePenalties noauth:0` in sshd; without it, OpenSSH
# penalises GitHub's shared runner IPs and this deploy fails with i/o timeout.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            cd ~/hypamail-web
            git fetch origin
            git reset --hard origin/main
            podman build --network=host -t localhost/hypamail-web:latest .
            systemctl --user restart hypamail-web.service
            podman image prune -f
